name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Run tests
        run: |
          xcodebuild test \
            -project Puma/Puma.xcodeproj \
            -scheme Puma \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.6' \
            -resultBundlePath TestResults